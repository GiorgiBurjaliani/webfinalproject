<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to OpportunityHub to discover and save technology opportunities.">
  <title>Login - OpportunityHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

  <main class="login-container">
    <div class="login-card">
      <div class="login-card__logo">
        <span class="login-card__logo-icon">O</span>
        OpportunityHub
      </div>
      <h1 class="login-card__title">Welcome back!</h1>
      <p class="login-card__subtitle">Enter your name to continue to OpportunityHub.</p>

      <form id="login-form" class="login-form" novalidate>
        <div class="form-field">
          <label for="name-input" class="form-field__label">Your name</label>
          <input
            id="name-input"
            type="text"
            name="name"
            class="form-field__input"
            required
            minlength="2"
            maxlength="50"
            placeholder="e.g. Giorgi"
            autocomplete="name"
          >
          <p id="login-error" class="form-field__error" aria-live="polite" hidden></p>
        </div>

        <button type="submit" class="btn btn--primary login-form__submit">Continue</button>
      </form>
    </div>
  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
