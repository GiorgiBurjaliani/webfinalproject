<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>
  
  <!-- Rhombus Hub Grid -->
  <g transform="translate(400,200) scale(1.2)">
    <polygon points="0,-60 60,0 0,60 -60,0" fill="none" stroke="#6366f1" stroke-width="4"/>
    <polygon points="0,-40 40,0 0,40 -40,0" fill="none" stroke="#a855f7" stroke-width="3"/>
    <polygon points="0,-20 20,0 0,20 -20,0" fill="none" stroke="#38bdf8" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#fff"/>
  </g>

  <!-- Tagline -->
  <text x="400" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="#fff" text-anchor="middle" letter-spacing="4">OPPORTUNITY HUB</text>
  <text x="400" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#94a3b8" text-anchor="middle" letter-spacing="6">DISCOVER &amp; DEVELOP</text>
</svg>
