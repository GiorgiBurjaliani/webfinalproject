<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#311042"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>

  <!-- Concentric circles for trophy background -->
  <circle cx="400" cy="200" r="140" fill="none" stroke="#f472b6" stroke-width="2" opacity="0.15"/>
  <circle cx="400" cy="200" r="100" fill="none" stroke="#f472b6" stroke-width="2" opacity="0.25" stroke-dasharray="8,6"/>

  <!-- Trophy Icon -->
  <!-- Base -->
  <rect x="350" y="310" width="100" height="15" rx="4" fill="url(#gold)"/>
  <path d="M 380,310 L 385,280 L 415,280 L 420,310 Z" fill="url(#gold)"/>
  <!-- Bowl -->
  <path d="M 330,150 C 330,260 470,260 470,150 Z" fill="url(#gold)"/>
  <!-- Handles -->
  <path d="M 330,165 C 300,165 300,210 335,210" fill="none" stroke="#fbbf24" stroke-width="8"/>
  <path d="M 470,165 C 500,165 500,210 465,210" fill="none" stroke="#fbbf24" stroke-width="8"/>

  <!-- Text -->
  <text x="400" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#f472b6" text-anchor="middle" letter-spacing="6">CHALLENGE &amp; COMPETITION</text>
</svg>
