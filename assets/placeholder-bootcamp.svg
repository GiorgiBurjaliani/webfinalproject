<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#062f4f"/>
      <stop offset="100%" stop-color="#111e25"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>

  <!-- Code window frame -->
  <rect x="200" y="80" width="400" height="240" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <!-- Top bar -->
  <path d="M 200,110 L 600,110" stroke="#334155" stroke-width="2"/>
  <circle cx="220" cy="95" r="5" fill="#ef4444"/>
  <circle cx="235" cy="95" r="5" fill="#f59e0b"/>
  <circle cx="250" cy="95" r="5" fill="#10b981"/>

  <!-- Code lines -->
  <rect x="220" y="130" width="120" height="10" rx="3" fill="#6366f1" opacity="0.8"/>
  <rect x="220" y="155" width="260" height="10" rx="3" fill="#38bdf8" opacity="0.8"/>
  <rect x="240" y="180" width="180" height="10" rx="3" fill="#a855f7" opacity="0.8"/>
  <rect x="240" y="205" width="220" height="10" rx="3" fill="#10b981" opacity="0.8"/>
  <rect x="220" y="230" width="90" height="10" rx="3" fill="#f43f5e" opacity="0.8"/>
  <rect x="220" y="255" width="140" height="10" rx="3" fill="#6366f1" opacity="0.8"/>

  <!-- Bootcamps label -->
  <text x="400" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#38bdf8" text-anchor="middle" letter-spacing="6">INTENSIVE BOOTCAMP</text>
</svg>
